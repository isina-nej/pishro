upstream pishro_upstream {
    server 127.0.0.1:3000;
}

upstream pishro_admin_upstream {
    server 127.0.0.1:3001;
}

# HTTP to HTTPS redirect for main domain
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name pishrosarmaye.com www.pishrosarmaye.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server block for main domain
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name pishrosarmaye.com www.pishrosarmaye.com pishro.local _;
    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/pishrosarmaye.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pishrosarmaye.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # serve static files from disk for better reliability and performance
    location /font/ {
        alias /opt/pishro/public/font/;
        access_log off;
        expires 30d;
    }

    location /images/ {
        alias /opt/pishro/public/images/;
        access_log off;
        expires 30d;
    }

    location /uploads/ {
        alias /opt/pishro/public/uploads/;
        access_log off;
        expires 30d;
    }

    location /videos/ {
        alias /opt/pishro/public/videos/;
        access_log off;
        expires 30d;
    }

    # proxy the remaining "_next", "api" and internal static routes to Next.js
    location ~ ^/(_next|api|static)/ {
        proxy_pass http://pishro_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
    }

    location / {
        proxy_pass http://pishro_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTP to HTTPS redirect for admin domain
server {
    listen 80;
    listen [::]:80;
    server_name admin.pishrosarmaye.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS server block for admin domain
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.pishrosarmaye.com admin.pishro.local pishro-admin.local;
    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/pishrosarmaye.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pishrosarmaye.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # admin: serve static public files directly from pishro-admin
    location /font/ {
        alias /opt/pishro-admin/public/font/;
        access_log off;
        expires 30d;
    }

    location /images/ {
        alias /opt/pishro-admin/public/images/;
        access_log off;
        expires 30d;
    }

    location /uploads/ {
        alias /opt/pishro-admin/public/uploads/;
        access_log off;
        expires 30d;
    }

    location /videos/ {
        alias /opt/pishro-admin/public/videos/;
        access_log off;
        expires 30d;
    }

    location ~ ^/(_next|api|static)/ {
        proxy_pass http://pishro_admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        expires 30d;
    }

    location / {
        proxy_pass http://pishro_admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
